<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | 3D Character Artist</title>
    <style>
        /* Variables y tipografía estilo Apple */
        :root {
            --bg-color: #000000;
            --surface-color: #1d1d1f;
            --text-primary: #f5f5f7;
            --text-secondary: #86868b;
            --border-radius: 18px;
            --transition: 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }

        /* Hero Section (Video Reel) */
        .hero {
            position: relative;
            width: 100%;
            height: 80vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-align: center;
        }

        .hero video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            opacity: 0.6; /* Oscurece el vídeo para legibilidad del texto */
        }

        .hero-content {
            position: relative;
            z-index: 1;
        }

        .hero h1 {
            font-size: 4rem;
            letter-spacing: -0.04em;
            margin: 0;
            font-weight: 600;
        }

        .hero p {
            font-size: 1.5rem;
            color: var(--text-secondary);
            margin-top: 10px;
            font-weight: 400;
        }

        /* Galería (Grid tipo ArtStation) */
        .gallery-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .gallery-header {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 30px;
            letter-spacing: -0.02em;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .card {
            background-color: var(--surface-color);
            border-radius: var(--border-radius);
            overflow: hidden;
            cursor: pointer;
            transition: transform var(--transition);
        }

        .card:hover {
            transform: scale(1.02);
        }

        .card img {
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            display: block;
        }

        .card-info {
            padding: 20px;
        }

        .card-info h3 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 500;
        }

        /* Desplegable (Modal) */
        .modal {
            visibility: hidden;
            opacity: 0;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity var(--transition), visibility var(--transition);
            padding: 20px;
            box-sizing: border-box;
        }

        .modal.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-content {
            background-color: var(--bg-color);
            border-radius: 24px;
            max-width: 1000px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .modal-body {
            padding: 40px;
        }

        .close-btn {
            position: sticky;
            top: 20px;
            float: right;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: var(--text-primary);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background var(--transition);
            z-index: 2;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .modal-title {
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            font-weight: 600;
            letter-spacing: -0.03em;
        }

        .modal-desc {
            color: var(--text-secondary);
            font-size: 1.1rem;
            line-height: 1.5;
            margin-bottom: 40px;
            max-width: 800px;
        }

        .project-images img {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 24px;
            display: block;
        }
        
        /* Ocultar barra de desplazamiento en el modal para un look más limpio */
        .modal-content::-webkit-scrollbar {
            width: 8px;
        }
        .modal-content::-webkit-scrollbar-thumb {
            background-color: #333;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <!-- Sección de Video Reel -->
    <header class="hero">
        <video autoplay muted loop playsinline>
            <!-- Reemplaza con la ruta a tu video reel -->
            <source src="tu-video-reel.mp4" type="video/mp4">
        </video>
        <div class="hero-content">
            <h1>Tu Nombre</h1>
            <p>3D Character Artist</p>
        </div>
    </header>

    <!-- Galería de Proyectos -->
    <main class="gallery-container">
        <h2 class="gallery-header">Portfolio</h2>
        <div class="gallery">
            
            <!-- Tarjeta de Proyecto 1 -->
            <article class="card" onclick="openModal('proyecto1')">
                <!-- Reemplaza con tu imagen miniatura (thumbnail) -->
                <img src="https://via.placeholder.com/600x338/1d1d1f/f5f5f7?text=Thumbnail+1" alt="Proyecto 1">
                <div class="card-info">
                    <h3>Personaje Sci-Fi</h3>
                </div>
            </article>

            <!-- Tarjeta de Proyecto 2 -->
            <article class="card" onclick="openModal('proyecto2')">
                <img src="https://via.placeholder.com/600x338/1d1d1f/f5f5f7?text=Thumbnail+2" alt="Proyecto 2">
                <div class="card-info">
                    <h3>Creatura Fantástica</h3>
                </div>
            </article>

            <!-- Tarjeta de Proyecto 3 -->
            <article class="card" onclick="openModal('proyecto3')">
                <img src="https://via.placeholder.com/600x338/1d1d1f/f5f5f7?text=Thumbnail+3" alt="Proyecto 3">
                <div class="card-info">
                    <h3>Estudio de Anatomía</h3>
                </div>
            </article>

        </div>
    </main>

    <!-- Modal (Desplegable de detalles) -->
    <div id="projectModal" class="modal">
        <div class="modal-content">
            <div class="modal-body">
                <button class="close-btn" onclick="closeModal()">✕</button>
                <h2 id="modalTitle" class="modal-title">Título del Proyecto</h2>
                <p id="modalDesc" class="modal-desc">Descripción del proceso y herramientas.</p>
                
                <div id="modalImages" class="project-images">
                    <!-- Las imágenes se inyectan dinámicamente vía JavaScript -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // Base de datos local de proyectos
        const projectData = {
            'proyecto1': {
                title: 'Personaje Sci-Fi',
                desc: 'Modelado de alta resolución en ZBrush, retopología en Maya. Texturizado utilizando Substance 3D Painter y renderizado final en Arnold. Flujo de trabajo optimizado para cinemáticas.',
                images: [
                    'https://via.placeholder.com/1200x800/1d1d1f/f5f5f7?text=Beauty+Render',
                    'https://via.placeholder.com/1200x800/1d1d1f/f5f5f7?text=Wireframe',
                    'https://via.placeholder.com/1200x800/1d1d1f/f5f5f7?text=Turnaround'
                ]
            },
            'proyecto2': {
                title: 'Creatura Fantástica',
                desc: 'Diseño de concepto a modelo 3D. Esculpido orgánico y pintado de texturas con Polypaint. Preparado para rigging en Blender.',
                images: [
                    'https://via.placeholder.com/1200x800/1d1d1f/f5f5f7?text=Render+Frontal',
                    'https://via.placeholder.com/1200x800/1d1d1f/f5f5f7?text=Detalles+de+Esculpido'
                ]
            },
            'proyecto3': {
                title: 'Estudio de Anatomía',
                desc: 'Estudio enfocado en la musculatura y proporciones humanas. Modelado tradicional en ZBrush basado en referencias fotográficas y escaneos.',
                images: [
                    'https://via.placeholder.com/1200x800/1d1d1f/f5f5f7?text=Vista+Frontal',
                    'https://via.placeholder.com/1200x800/1d1d1f/f5f5f7?text=Vista+Trasera',
                    'https://via.placeholder.com/1200x800/1d1d1f/f5f5f7?text=Primer+Plano'
                ]
            }
        };

        const modal = document.getElementById('projectModal');

        function openModal(projectId) {
            const data = projectData[projectId];
            if (!data) return;

            // Rellenar textos
            document.getElementById('modalTitle').textContent = data.title;
            document.getElementById('modalDesc').textContent = data.desc;

            // Rellenar imágenes
            const imagesContainer = document.getElementById('modalImages');
            imagesContainer.innerHTML = ''; // Limpiar imágenes previas
            
            data.images.forEach(imgSrc => {
                const img = document.createElement('img');
                img.src = imgSrc;
                img.alt = data.title;
                img.loading = "lazy"; // Optimización de carga
                imagesContainer.appendChild(img);
            });

            // Mostrar modal y bloquear scroll del fondo
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.remove('active');
            document.body.style.overflow = 'auto'; // Restaurar scroll
            
            // Pausa breve antes de vaciar las imágenes para mantener la animación limpia
            setTimeout(() => {
                document.getElementById('modalImages').innerHTML = '';
            }, 300);
        }

        // Cerrar modal al hacer clic en el fondo oscuro
        modal.addEventListener('click', function(e) {
            if (e.target === modal) {
                closeModal();
            }
        });

        // Cerrar modal con la tecla Escape
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && modal.classList.contains('active')) {
                closeModal();
            }
        });
    </script>

</body>
</html>
